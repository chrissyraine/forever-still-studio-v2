<form id="contactForm" class="contact-form">
  <div class="form-group">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
  </div>
  
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>
  
  <div class="form-group">
    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone" required>
  </div>
  
  <div class="form-group">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>
  </div>
  
  <button type="submit" class="btn btn-primary">Send Message</button>
  
  <div id="formStatus" class="form-status" aria-live="polite"></div>
</form>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const contactForm = document.getElementById('contactForm');
    const formStatus = document.getElementById('formStatus');
    
    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Collect form data
      const formData = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        message: document.getElementById('message').value.trim()
      };
      
      try {
        // Submit form data as JSON
        const response = await fetch('https://subsector-botanist-karate.ngrok-free.dev/contact', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Fortress-Token': 'fss-forever-still-xK9mQpRt2026'
          },
          body: JSON.stringify(formData)
        });
        
        if (!response.ok) {
          throw new Error(`Server responded with ${response.status}`);
        }
        
        // Show success message
        formStatus.textContent = "Thank you! Your message has been sent successfully.";
        formStatus.className = "form-status success";
        
        // Reset form
        contactForm.reset();
        
        // Hide success message after 5 seconds
        setTimeout(() => {
          formStatus.style.opacity = "0";
        }, 5000);
        
      } catch (error) {
        console.error('Error submitting form:', error);
        
        // Show error message
        formStatus.textContent = "Something went wrong. Please try again later.";
        formStatus.className = "form-status error";
        
        // Hide error message after 5 seconds
        setTimeout(() => {
          formStatus.style.opacity = "0";
        }, 5000);
      }
    });
  });
</script>

<style>
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-md);
    max-width: 600px;
    margin: 0 auto;
  }
  
  .form-group {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
  }
  
  .form-group label {
    font-weight: 500;
  }
  
  .form-group input,
  .form-group textarea {
    padding: var(--spacing-sm);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: inherit;
  }
  
  .form-status {
    margin-top: var(--spacing-md);
    padding: var(--spacing-sm);
    border-radius: var(--radius-sm);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  
  .form-status.success {
    background-color: var(--color-success-bg, #e6f7e6);
    color: var(--color-success, #2e7d32);
    opacity: 1;
  }
  
  .form-status.error {
    background-color: var(--color-error-bg, #fdeded);
    color: var(--color-error, #d32f2f);
    opacity: 1;
  }
</style>
